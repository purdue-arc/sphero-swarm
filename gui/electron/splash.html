<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sphero Swarm</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: linear-gradient(135deg, #0a0e27 0%, #1a0f3a 50%, #0f1a40 100%);
      font-family: 'Space Mono', monospace;
      color: #e8f4f2;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .ui {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    .wordmark {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: -0.02em;
      color: #fff;
      text-shadow: 0 0 60px rgba(165, 100, 255, 0.5), 0 0 30px rgba(138, 43, 226, 0.3);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .wordmark span {
      color: #b085ff;
      text-shadow: 0 0 40px rgba(165, 100, 255, 0.8);
    }

    .tagline {
      margin-top: 0.5rem;
      font-size: clamp(0.65rem, 1.2vw, 0.8rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(181, 133, 255, 0.6);
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
    }

    .loader-wrap {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    }

    .progress-track {
      width: clamp(200px, 30vw, 320px);
      height: 2px;
      background: rgba(181, 133, 255, 0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8a5bff, #b085ff, #e599ff);
      border-radius: 2px;
      transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0 15px rgba(176, 133, 255, 0.6), 0 0 30px rgba(138, 91, 255, 0.3);
    }

    .status {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: rgba(181, 133, 255, 0.55);
      min-height: 1em;
      transition: opacity 0.2s;
    }

    .dots {
      display: inline-block;
      width: 1.5em;
      text-align: left;
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
      100% { content: ''; }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .splash-root {
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    .splash-root.fading {
      opacity: 0;
    }

    .action-button {
      margin-top: 2rem;
      padding: 0.75rem 2.5rem;
      background: linear-gradient(135deg, #8a5bff 0%, #b085ff 100%);
      color: #fff;
      border: 1px solid rgba(181, 133, 255, 0.4);
      border-radius: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 0 25px rgba(138, 91, 255, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .action-button.visible {
      opacity: 1;
      pointer-events: auto;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .action-button:hover {
      box-shadow: 0 0 50px rgba(176, 133, 255, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
      background: linear-gradient(135deg, #9970ff 0%, #c29fff 100%);
    }

    .action-button:active {
      transform: scale(0.98);
    }

    .loader-wrap.complete {
      display: none;
    }
  </style>
</head>
<body>
  <div class="splash-root" id="root">
    <canvas id="swarm-canvas"></canvas>
    <div class="ui">
      <div class="wordmark">Sphero <span>Swarm</span></div>
      <div class="tagline">Step-growth polymerization</div>
      <div class="loader-wrap" id="loader-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="status" id="status-text">Initializing<span class="dots">...</span></div>
      </div>
      <button class="action-button" id="launch-button">Launch Application</button>
    </div>
  </div>

  <script>
    // ── Simulation ────────────────────────────────────────────────────────────
    const DIRECTIONS = 8;
    const POSITION_CHANGE = {
      0:[0,0],1:[0,1],2:[1,1],3:[1,0],4:[1,-1],5:[0,-1],6:[-1,-1],7:[-1,0],8:[-1,1]
    };
    const COLORS = ["#6dd6c2","#f26b3a","#f1c453","#5aa7a0","#6c9af7","#f18fd2"];
    const EPSILON = 0.01;

    class Sphero {
      constructor({id,x,y,color,speed=1.4,direction=1}) {
        Object.assign(this,{id,x,y,targetX:x,targetY:y,previousDirection:direction,direction,speed,color});
      }
      computeTargetPosition(d){const[dx,dy]=POSITION_CHANGE[d];return[this.x+dx,this.y+dy];}
      updateTarget(){const[nx,ny]=this.computeTargetPosition(this.direction);this.targetX=nx;this.targetY=ny;}
      updateDirection(d){this.previousDirection=this.direction;this.direction=d;}
      updateMovement(d){this.updateDirection(d);this.updateTarget();}
      canBond(a){return Math.abs(this.x-a.x)<=1&&Math.abs(this.y-a.y)<=1;}
    }

    class Swarm {
      constructor(n){
        this.bondedGroups=Array.from({length:n},(_,i)=>[i+1]);
        this.bondedGroupIndex=Array.from({length:n},(_,i)=>i);
      }
      isBonded(a,b){return this.bondedGroupIndex[a-1]===this.bondedGroupIndex[b-1];}
      combine(a,b){
        const g1=this.bondedGroupIndex[a-1],g2=this.bondedGroupIndex[b-1];
        if(g1===g2)return false;
        for(const m of this.bondedGroups[g2])this.bondedGroupIndex[m-1]=g1;
        this.bondedGroups[g1].push(...this.bondedGroups[g2]);
        this.bondedGroups[g2]=[];
        return true;
      }
    }

    class Algorithm {
      constructor({gridWidth,gridHeight,nSpheros}){
        this.gridWidth=gridWidth;this.gridHeight=gridHeight;
        this.nodes=Array.from({length:gridWidth},()=>Array(gridHeight).fill(0));
        this.nSpheros=nSpheros;
        this.spheros=Array.from({length:nSpheros});
        let id=1;
        for(const[x,y]of this._randomGrid()){
          this.spheros[id-1]=new Sphero({id,x,y,color:COLORS[(id-1)%COLORS.length]});
          this.nodes[x][y]=id++;
        }
        this.swarm=new Swarm(nSpheros);
      }
      _rnd(){
        let x=Math.floor(Math.random()*this.gridWidth),y=Math.floor(Math.random()*this.gridHeight);
        while(this.nodes[x][y]){x=Math.floor(Math.random()*this.gridWidth);y=Math.floor(Math.random()*this.gridHeight);}
        this.nodes[x][y]=-1;return[x,y];
      }
      _randomGrid(){return Array.from({length:this.nSpheros},()=>this._rnd());}
      find(id){return id?this.spheros[id-1]:null;}
      inBounds(x,y){return x>=0&&x<this.gridWidth&&y>=0&&y<this.gridHeight;}
      isValidMove(d,s){
        const[tx,ty]=s.computeTargetPosition(d);
        if(!this.inBounds(tx,ty))return false;
        const occ=this.nodes[tx][ty];
        return!occ||this.swarm.isBonded(s.id,occ);
      }
      validMoves(s,dirs){return dirs.filter(d=>this.isValidMove(d,s));}
      groupMove(g){
        let dirs=Array.from({length:DIRECTIONS},(_,i)=>i+1);
        for(const id of g){const s=this.find(id);dirs=this.validMoves(s,dirs);}
        return dirs.length?dirs[Math.floor(Math.random()*dirs.length)]:0;
      }
      updateNodes(s){this.nodes[Math.round(s.x)][Math.round(s.y)]=0;this.nodes[s.targetX][s.targetY]=s.id;}
      updateGridMove(){
        for(const g of this.swarm.bondedGroups){
          if(!g.length)continue;
          const d=this.groupMove(g);
          for(const id of g){const s=this.find(id);if(s){s.updateMovement(d);this.updateNodes(s);}}
        }
      }
      updateGridBonds(){
        for(const s of this.spheros){
          for(let d=1;d<=DIRECTIONS;d++){
            const[dx,dy]=POSITION_CHANGE[d],ax=s.x+dx,ay=s.y+dy;
            if(this.inBounds(ax,ay)){const aid=this.nodes[ax][ay];if(aid){const a=this.find(aid);if(a&&s.canBond(a))this.swarm.combine(s.id,aid);}}
          }
        }
      }
    }

    // ── Canvas setup ─────────────────────────────────────────────────────────
    const canvas = document.getElementById('swarm-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, gw, gh, cellSize, ox, oy, algo, raf, running = false;

    function setup() {
      w = window.innerWidth; h = window.innerHeight;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(w * dpr); canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const cell = Math.max(48, Math.min(w, h) / 12);
      gw = Math.max(12, Math.floor(w / cell));
      gh = Math.max(8, Math.floor(h / cell));
      cellSize = Math.min(w / (gw - 1), h / (gh - 1));
      ox = (w - cellSize * (gw - 1)) / 2;
      oy = (h - cellSize * (gh - 1)) / 2;
      const n = Math.min(24, gw * gh - 2);
      algo = new Algorithm({ gridWidth: gw, gridHeight: gh, nSpheros: n });
      for (const s of algo.spheros) s.speed = 1.7;
    }

    function draw(ts) {
      if (!running) return;
      const dt = Math.min((ts - (draw._last || ts)) / 1000, 0.05);
      draw._last = ts;

      const grad = ctx.createRadialGradient(w*.2,h*.2,80,w*.6,h*.3,Math.max(w,h));
      grad.addColorStop(0,'rgba(80,50,150,0.25)'); grad.addColorStop(0.5,'rgba(30,15,60,0.3)'); grad.addColorStop(1,'rgba(10,14,39,0.4)');
      ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);

      ctx.save(); ctx.strokeStyle='rgba(109,214,194,0.08)'; ctx.lineWidth=1;
      for(let x=0;x<gw;x++){ctx.beginPath();ctx.moveTo(ox+x*cellSize,oy);ctx.lineTo(ox+x*cellSize,oy+(gh-1)*cellSize);ctx.stroke();}
      for(let y=0;y<gh;y++){ctx.beginPath();ctx.moveTo(ox,oy+y*cellSize);ctx.lineTo(ox+(gw-1)*cellSize,oy+y*cellSize);ctx.stroke();}
      ctx.restore();

      let allReached = true;
      for (const s of algo.spheros) {
        const dx = s.targetX - s.x, dy = s.targetY - s.y;
        if (Math.abs(dx) > EPSILON || Math.abs(dy) > EPSILON) {
          const[pdx,pdy]=POSITION_CHANGE[s.direction];
          s.x+=pdx*s.speed*dt; s.y+=pdy*s.speed*dt; allReached=false;
        } else { s.x=s.targetX; s.y=s.targetY; }
      }
      if (allReached) { algo.updateGridBonds(); algo.updateGridMove(); }

      ctx.save(); ctx.strokeStyle='rgba(241,196,83,0.45)'; ctx.lineWidth=2;
      for(const g of algo.swarm.bondedGroups){
        if(g.length<2)continue;
        for(let i=0;i<g.length;i++){const a=algo.find(g[i]);
          for(let j=i+1;j<g.length;j++){const b=algo.find(g[j]);
            if(!a||!b)continue;
            if(Math.abs(a.x-b.x)<=1&&Math.abs(a.y-b.y)<=1){
              ctx.beginPath();ctx.moveTo(ox+a.x*cellSize,oy+a.y*cellSize);ctx.lineTo(ox+b.x*cellSize,oy+b.y*cellSize);ctx.stroke();
            }
          }
        }
      }
      ctx.restore();

      ctx.save();
      for(const s of algo.spheros){
        const sx=ox+s.x*cellSize,sy=oy+s.y*cellSize,r=Math.max(6,cellSize*0.22);
        ctx.beginPath();ctx.fillStyle=s.color;ctx.shadowColor=s.color;ctx.shadowBlur=16;
        ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=1.2;ctx.stroke();
      }
      ctx.restore();

      raf = requestAnimationFrame(draw);
    }

    setup();
    window.addEventListener('resize', () => { if (raf) cancelAnimationFrame(raf); setup(); if (running) raf = requestAnimationFrame(draw); });

    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      running = true;
      raf = requestAnimationFrame(draw);
    }

    // ── Loading status (driven by IPC from main process) ─────────────────────
    const fill = document.getElementById('progress-fill');
    const statusEl = document.getElementById('status-text');

    const STATUSES = [
      'Initializing',
      'Connecting to robots',
      'Loading perception',
      'Calibrating grid',
      'Warming up algorithms',
      'Almost ready',
    ];

    function setProgress(pct) {
      fill.style.width = pct + '%';
      const idx = Math.min(Math.floor((pct / 100) * STATUSES.length), STATUSES.length - 1);
      statusEl.innerHTML = STATUSES[idx] + '<span class="dots">...</span>';
    }

    // Listen for progress updates from main process via IPC
    if (window.electronAPI && window.electronAPI.onSplashProgress) {
      window.electronAPI.onSplashProgress((pct) => {
        // Only update progress if button isn't visible yet
        if (!launchButton.classList.contains('visible')) {
          setProgress(pct);
          if (pct >= 100) {
            showLaunchButton();
          }
        }
      });
    }

    const launchButton = document.getElementById('launch-button');
    const loaderWrap = document.getElementById('loader-wrap');
    const splashRoot = document.getElementById('root');

    function showLaunchButton() {
      if (launchButton) {
        launchButton.classList.add('visible');
      }
    }

    if (launchButton) {
      launchButton.addEventListener('click', () => {
        // Signal main process that user clicked the button
        if (window.electronAPI && window.electronAPI.splashButtonClicked) {
          window.electronAPI.splashButtonClicked();
        }
        // Begin transition animation
        if (splashRoot) {
          splashRoot.classList.add('fading');
        }
      });
    }
  </script>
</body>
</html>
